name: Deploy Chatbot
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    # 1. Chuyển sang self-hosted để dùng runner trên server của bạn
    runs-on: self-hosted 
    steps:
      - uses: actions/checkout@v3
      
      - name: Deploy to Server
        env:
            # Đảm bảo bạn đã lưu NVIDIA_API_KEY trong GitHub Settings > Secrets
            NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
        run: |
          # 2. Xóa hết nội dung cũ trong thư mục production (nếu cần sạch) 
          # hoặc bạn có thể bỏ qua dòng này nếu muốn giữ file cũ
          rm -rf /root/chatbot_root/chatbot
          
          # 3. Copy source code vừa checkout từ github vào thư mục production
          cp -r . /root/chatbot_root/chatbot
          
          # 4. Di chuyển vào thư mục và chạy docker-compose
          cd /root/chatbot_root/chatbot
          
          # Tạo file .env tạm thời trên server để docker-compose đọc
          echo "NVIDIA_API_KEY=$NVIDIA_API_KEY" >> .env
          
          # 5. Dừng và khởi động lại container có --build là nó tự biết xóa thư viện cũ
          docker compose down
          docker compose up -d --build